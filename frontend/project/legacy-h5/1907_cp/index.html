  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="x5-orientation" content="portrait">
  <meta name="screen-orientation" content="portrait">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>台湾剧CP</title>
</head>
<body>
  <audio
    id="audio"
    preload="auto"
    loop="true"
  ></audio>
  <div id="Loading">
    <img
      id="loadingImg"
      class="other"
      style="width: 100%; height: 100%; display: none;"
      src="./asset/loading/begin.gif"
      alt=""
    >
    <div class="other" id="rateOuter">
      <img
        src="./asset/loading/loading.gif"
        style="position: absolute; display: block; top: 35%; left: 50%; transform: translate(-50%, -40%) scale(0.5, 0.5)"
        >
      <p id="rate"></p>
    </div>
  </div>
  <video
    id="videoQ1" 
    style="display: none;"
    class="other"
    muted="muted"
    loop="true"
    preload="auto"
    webkit-playsinline="true"
    playsinline="true"
    x-webkit-airplay="allow"
    x5-video-player-fullscreen="true"
    x5-video-orientation="portraint"
    
  >
    <source src="./asset/topic1/question.mp4" type="video/mp4">
  </video>
  <video
    loop="true"
    id="videoQ4"
    class="other"
    muted="muted"
    preload="auto"
    playsinline="true"
    style="display: none;"
    x-webkit-airplay="allow"
    webkit-playsinline="true"
    x5-video-player-fullscreen="true"
    x5-video-orientation="portraint"
    
  >
    <source src="./asset/topic4/video.mp4" type="video/mp4">
  </video>
  <input
    id="infoInput"
    style="display: none;"
    type="text"
    class="other"
  >
  <div id="app">
  </div>
  <div id="out">
    <img id="shareImage" >
  </div>
  
  <script src="../script/hilo/1.6.0/hilo-min.js"></script>
  <script src="../script/jquery/3.4.1/jquery.min.js"></script>
  <script type="module" src="./js/index.js"></script>
</body>
</html>
