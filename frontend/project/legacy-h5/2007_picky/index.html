<!doctype html>
<html lang="zh-Hans">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750 user-scalable=no" />
  <title>我的挑食清单</title>
  <link rel="icon" href="data:,">
  <script>
    // 分辨率适配
    (function() {
      var winWidth = document.documentElement.clientWidth || window.screen.width || window.outerWidth || document.documentElement.scrollWidth;
      var winHeight = document.documentElement.clientHeight || window.screen.height || window.outerHeight || document.documentElement.scrollHeight;
      var ratio = 750 / 1334
      if ((winWidth / winHeight) < ratio) {
        var fontSizeRoot = winWidth / 375 * (100 / (750 / 375)) + 'px';
      } else {
        var fontSizeRoot = winHeight / 667 * (100 / (1334 / 667)) + 'px';
      }
      document.documentElement.style.fontSize = fontSizeRoot;
    })();
  </script>
  <script>
    // 取消ios手势操作
    window.onload = function() {
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      });
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        var now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
      document.addEventListener('gesturestart', function(event) {
        event.preventDefault();
      });
    }
  </script>
</head>

<body>
  <div id="app"></div>
  <div id="bottom-util"></div>
  <script src="%BASE_URL%script/hilo/1.6.0/hilo-min.js"></script>
  <script src="%BASE_URL%script/jquery/3.4.1/jquery.min.js"></script>
  <script src="%BASE_URL%script/scroller/1.2.2/Animate.js"></script>
  <script src="%BASE_URL%script/scroller/1.2.2/Scroller.js"></script>
  <script type="module" src="./js/index.js"></script>
</body>

</html>
